services:
  # ============================================
  # LocalStack - Simulated AWS Environment
  # ============================================
  localstack:
    container_name: "localstack_main"
    image: localstack/localstack:3.0.0
    ports:
      - "127.0.0.1:4566:4566"            # LocalStack Gateway
      - "127.0.0.1:4510-4559:4510-4559"  # External services port range
    environment:
      - DEBUG=1
      - SERVICES=s3,sqs,dynamodb,iam
      - PERSISTENCE=0
      - LOCALSTACK_VOLUME_DIR=/var/lib/localstack
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
      - "./localstack_init:/etc/localstack/init/ready.d"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:4566/_localstack/health | grep -q '\"services\"' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - pipeline-network

  # ============================================
  # GCP Pub/Sub Emulator
  # ============================================
  pubsub-emulator:
    container_name: "pubsub_emulator"
    image: gcr.io/google.com/cloudsdktool/cloud-sdk:emulators
    command: gcloud beta emulators pubsub start --host-port=0.0.0.0:8085
    ports:
      - "8085:8085"
    networks:
      - pipeline-network

  # ============================================
  # Local PostgreSQL (Simulating Cloud SQL)
  # ============================================
  postgres:
    container_name: "postgres_db"
    image: postgres:14
    environment:
      - POSTGRES_DB=${CLOUD_SQL_DATABASE:-pipelinedb}
      - POSTGRES_USER=${CLOUD_SQL_USER:-pipeline_user}
      - POSTGRES_PASSWORD=${CLOUD_SQL_PASSWORD:-pipeline_password}
    ports:
      - "5432:5432"
    networks:
      - pipeline-network

  # ============================================
  # Bridge Application - SQS → Pub/Sub Forwarder
  # ============================================
  bridge:
    container_name: "bridge_app"
    build:
      context: ./src/bridge
      dockerfile: Dockerfile
    depends_on:
      localstack:
        condition: service_healthy
      pubsub-emulator:
        condition: service_started
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
      - LOCALSTACK_ENDPOINT=http://localstack:4566
      - SQS_QUEUE_NAME=${SQS_QUEUE_NAME:-data-processing-queue}
      - PUBSUB_TOPIC=${PUBSUB_TOPIC:-localstack-events}
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      # Tell bridge app to use the emulator!
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - POLL_INTERVAL_SECONDS=${POLL_INTERVAL_SECONDS:-5}
      - SQS_WAIT_TIME_SECONDS=${SQS_WAIT_TIME_SECONDS:-20}
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - pipeline-network

  # ============================================
  # Processor Function - Pub/Sub → Cloud SQL + DynamoDB
  # ============================================
  processor:
    container_name: "processor_function"
    build:
      context: ./src/processor_function
      dockerfile: Dockerfile
    depends_on:
      pubsub-emulator:
        condition: service_started
      postgres:
        condition: service_started
      localstack:
        condition: service_healthy
    environment:
      - GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - PUBSUB_EMULATOR_HOST=pubsub-emulator:8085
      - CLOUD_SQL_HOST=postgres
      - CLOUD_SQL_PORT=5432
      - CLOUD_SQL_DATABASE=${CLOUD_SQL_DATABASE:-pipelinedb}
      - CLOUD_SQL_USER=${CLOUD_SQL_USER:-pipeline_user}
      - CLOUD_SQL_PASSWORD=${CLOUD_SQL_PASSWORD:-pipeline_password}
      - DYNAMODB_ENDPOINT=http://localstack:4566
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-test}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-test}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION:-us-east-1}
    networks:
      - pipeline-network

networks:
  pipeline-network:
    driver: bridge
